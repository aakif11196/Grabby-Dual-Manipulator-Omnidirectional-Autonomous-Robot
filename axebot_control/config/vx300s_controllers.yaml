axebot:
  controller_manager:
    ros__parameters:
      update_rate: 10 # Hz
      arm_controller:
        type: joint_trajectory_controller/JointTrajectoryController
      gripper_controller:
        type: joint_trajectory_controller/JointTrajectoryController
      joint_state_broadcaster:
        type: joint_state_broadcaster/JointStateBroadcaster
  arm_controller:
    ros__parameters:
      joints:
        - vx300s_right_waist
        - vx300s_right_shoulder
        - vx300s_right_elbow
        - vx300s_right_forearm_roll
        - vx300s_right_wrist_angle
       # - vx300s_right_wrist_rotate
      command_interfaces:
        - position
      state_interfaces:
        - position
      state_publish_rate: 50.0 # Hz
      action_monitor_rate: 20.0 # Hz
      constraints:
        stopped_velocity_tolerance: 0.02
        goal_time: 1.0
  gripper_controller:
    ros__parameters:
      joints:
        - vx300s_right_left_finger
      command_interfaces:
        - position
      state_interfaces:
        - position
  joint_state_broadcaster:
    ros__parameters:
      joints:
        - vx300s_right_waist
        - vx300s_right_shoulder
        - vx300s_right_elbow
        - vx300s_right_forearm_roll
        - vx300s_right_wrist_angle
        - vx300s_right_left_finger
        - vx300s_right_right_finger
